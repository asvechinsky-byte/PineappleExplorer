name: Package, Sign & Publish Mac Release

# Workflow inputs control both stable and beta releases.
# From Windows, zip the raw dotnet publish output and upload to FTP:
#   Stable: PineappleExplorer-mac-publish.zip
#   Beta:   PineappleExplorer-mac-publish-beta.zip
# Then trigger this workflow with the matching inputs.
#
# IMPORTANT ordering: actions/setup-dotnet resets the keychain search list,
# so all dotnet/vpk operations run BEFORE the certificate is imported.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 0.9.2)'
        required: true
      prerelease:
        description: 'true = beta prerelease, false = stable'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  package-sign-publish:
    runs-on: macos-latest

    env:
      TEAM_ID: U66JC585MM
      KEY_ID: HY39BF4WZT

    steps:
      # ── Compute filenames from prerelease flag ────────────────────────────
      - name: Set filenames
        id: names
        run: |
          if [ "${{ github.event.inputs.prerelease }}" = "true" ]; then
            echo "raw_fn=PineappleExplorer-mac-publish-beta"   >> $GITHUB_OUTPUT
            echo "dist_fn=PineappleExplorer-mac-arm64-beta"    >> $GITHUB_OUTPUT
          else
            echo "raw_fn=PineappleExplorer-mac-publish"        >> $GITHUB_OUTPUT
            echo "dist_fn=PineappleExplorer-mac-arm64"         >> $GITHUB_OUTPUT
          fi

      # ── Get raw dotnet publish output ────────────────────────────────────
      - name: Download raw publish output from FTP
        run: |
          curl -u "alex@explorer.astroframe.com:${{ secrets.FTP_PASSWORD }}" \
            "ftp://giowm1258.siteground.biz/${{ steps.names.outputs.raw_fn }}.zip" \
            -o publish-raw.zip

      - name: Extract and set permissions
        run: |
          unzip -q publish-raw.zip -d pub
          # Restore execute bits lost when zipped on Windows
          chmod +x pub/PineappleExplorer
          find pub -name "*.dylib" -exec chmod +x {} \;
          find pub -name "*.so"    -exec chmod +x {} \;

      # ── Write entitlements ────────────────────────────────────────────────
      - name: Write entitlements
        run: |
          cat > entitlements.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>com.apple.security.cs.allow-jit</key><true/>
              <key>com.apple.security.cs.allow-unsigned-executable-memory</key><true/>
              <key>com.apple.security.cs.disable-library-validation</key><true/>
          </dict>
          </plist>
          PLIST

      # ── Install .NET 9 + vpk BEFORE keychain setup ───────────────────────
      # actions/setup-dotnet resets the keychain search list, so we must run
      # all dotnet operations first, then import the certificate afterwards.
      - name: Install .NET 9 SDK (required by vpk 0.0.1298)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Install vpk
        run: dotnet tool install -g vpk

      # ── Velopack packaging (nupkgs for auto-update) ──────────────────────
      - name: Package with vpk (creates Velopack nupkgs)
        run: |
          ~/.dotnet/tools/vpk pack \
            --packId       PineappleExplorer \
            --packVersion  ${{ github.event.inputs.version }} \
            --packDir      pub \
            --outputDir    vpk-out \
            --channel      osx-arm64 \
            --mainExe      PineappleExplorer \
            --packAuthors  "Alex Svechnikov" \
            --packTitle    "Pineapple Explorer"

      # ── Create distributable .app bundle for FTP (first-time install) ────
      - name: Create .app bundle
        run: |
          APP="PineappleExplorer.app"
          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Resources"

          # Build .icns from the app.ico shipped in the publish output
          ICONSET="AppIcon.iconset"
          mkdir -p "$ICONSET"
          # sips converts ICO → PNG at each required size
          for SIZE in 16 32 64 128 256 512; do
            sips -s format png pub/app.ico --resampleHeightWidth $SIZE $SIZE \
              --out "$ICONSET/icon_${SIZE}x${SIZE}.png" 2>/dev/null || true
            DOUBLE=$((SIZE * 2))
            sips -s format png pub/app.ico --resampleHeightWidth $DOUBLE $DOUBLE \
              --out "$ICONSET/icon_${SIZE}x${SIZE}@2x.png" 2>/dev/null || true
          done
          iconutil -c icns "$ICONSET" -o "$APP/Contents/Resources/AppIcon.icns"

          cat > "$APP/Contents/Info.plist" << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>PineappleExplorer</string>
              <key>CFBundleIdentifier</key>
              <string>com.astroframe.pineappleexplorer</string>
              <key>CFBundleName</key>
              <string>Pineapple Explorer</string>
              <key>CFBundleDisplayName</key>
              <string>Pineapple Explorer</string>
              <key>CFBundleIconFile</key>
              <string>AppIcon</string>
              <key>CFBundleVersion</key>
              <string>${{ github.event.inputs.version }}</string>
              <key>CFBundleShortVersionString</key>
              <string>${{ github.event.inputs.version }}</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>NSHighResolutionCapable</key>
              <true/>
              <key>NSPrincipalClass</key>
              <string>NSApplication</string>
              <key>LSMinimumSystemVersion</key>
              <string>12.0</string>
              <key>NSHumanReadableCopyright</key>
              <string>Copyright © 2025 Alex Svechinsky. All rights reserved.</string>
              <key>LSApplicationCategoryType</key>
              <string>public.app-category.photography</string>
              <key>NSRequiresAquaSystemAppearance</key>
              <false/>
          </dict>
          </plist>
          PLIST

          # Copy all publish files into MacOS/
          cp -r pub/. "$APP/Contents/MacOS/"

      # ── Apple credentials — imported AFTER all dotnet operations ─────────
      # Doing this after dotnet setup prevents setup-dotnet from resetting
      # the keychain search list and breaking subsequent codesign calls.
      # We store the keychain path and pass it explicitly to codesign via
      # --keychain so the search list doesn't matter at all.
      - name: Import Developer ID certificate
        env:
          P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: |
          echo "$P12_BASE64" | base64 --decode > certificate.p12
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          security create-keychain -p actions "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p actions "$KEYCHAIN"
          security import certificate.p12 -k "$KEYCHAIN" \
            -P "$P12_PASSWORD" -T /usr/bin/codesign -A
          # Grant codesign partition access to the private key (required on macOS Catalina+)
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k actions "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" \
            $(security list-keychains -d user | tr -d '"' | xargs)
          rm certificate.p12
          echo "SIGNING_KEYCHAIN=$KEYCHAIN" >> $GITHUB_ENV

      - name: Import App Store Connect API key
        env:
          API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: |
          mkdir -p ~/private_keys
          echo "$API_KEY_BASE64" | base64 --decode \
            > ~/private_keys/AuthKey_${{ env.KEY_ID }}.p8

      # ── Sign and notarize the .app bundle ────────────────────────────────
      - name: Sign .app bundle
        run: |
          # Remove macOS resource-fork / DS_Store artifacts before signing
          find PineappleExplorer.app -name "._*"       -delete
          find PineappleExplorer.app -name ".DS_Store" -delete

          # Pass --keychain explicitly to bypass the search list
          codesign --force --deep --options runtime \
            --entitlements entitlements.plist \
            --keychain "$SIGNING_KEYCHAIN" \
            --sign "Developer ID Application: Alex Svechinsky (${{ env.TEAM_ID }})" \
            PineappleExplorer.app

          codesign --verify --deep --strict PineappleExplorer.app
          echo "Bundle signature OK"

      - name: Notarize .app bundle
        run: |
          ditto -c -k --keepParent PineappleExplorer.app notarize.zip

          # Retry up to 3 times — Apple's upload endpoint occasionally drops connections
          for attempt in 1 2 3; do
            echo "Notarization attempt $attempt..."
            xcrun notarytool submit notarize.zip \
              --key     ~/private_keys/AuthKey_${{ env.KEY_ID }}.p8 \
              --key-id  "${{ env.KEY_ID }}" \
              --issuer  "${{ secrets.APPLE_API_ISSUER_ID }}" \
              --wait \
              --output-format json > notarize_result.json 2>&1 && break
            echo "Attempt $attempt failed. Waiting 30s before retry..."
            sleep 30
          done

          cat notarize_result.json

          # Guard against empty result (e.g. all retries failed with a network error)
          if ! python3 -c "import json; json.load(open('notarize_result.json'))" 2>/dev/null; then
            echo "Notarization result is not valid JSON — all attempts failed."
            exit 1
          fi

          SUBMISSION_ID=$(python3 -c "import json; print(json.load(open('notarize_result.json'))['id'])")
          NOTARIZE_STATUS=$(python3 -c "import json; print(json.load(open('notarize_result.json'))['status'])")

          echo "=== Apple Notarization Log ==="
          xcrun notarytool log "$SUBMISSION_ID" \
            --key     ~/private_keys/AuthKey_${{ env.KEY_ID }}.p8 \
            --key-id  "${{ env.KEY_ID }}" \
            --issuer  "${{ secrets.APPLE_API_ISSUER_ID }}" || true

          if [ "$NOTARIZE_STATUS" != "Accepted" ]; then
            echo "Notarization failed: $NOTARIZE_STATUS"
            exit 1
          fi

          xcrun stapler staple PineappleExplorer.app

      # ── Create signed zip and upload to FTP ──────────────────────────────
      - name: Create signed distributable zip
        run: |
          ditto -c -k --keepParent \
            PineappleExplorer.app \
            "${{ steps.names.outputs.dist_fn }}.zip"

      - name: Upload signed distributable to FTP
        run: |
          curl -T "${{ steps.names.outputs.dist_fn }}.zip" \
            "ftp://giowm1258.siteground.biz/${{ steps.names.outputs.dist_fn }}.zip" \
            --user "alex@explorer.astroframe.com:${{ secrets.FTP_PASSWORD }}" \
            --ftp-pasv

      # ── Upload Setup.pkg to FTP ───────────────────────────────────────────────
      # TODO: sign with productsign (Developer ID Installer cert) + notarize once
      # the Installer certificate has been added to APPLE_CERT_P12_BASE64 secret.
      - name: Upload Setup.pkg to FTP
        run: |
          curl -T "vpk-out/PineappleExplorer-osx-arm64-Setup.pkg" \
            "ftp://giowm1258.siteground.biz/${{ steps.names.outputs.dist_fn }}.pkg" \
            --user "alex@explorer.astroframe.com:${{ secrets.FTP_PASSWORD }}" \
            --ftp-pasv

      # ── Upload Velopack nupkgs to GitHub Releases ────────────────────────
      - name: Delete existing osx-arm64 release assets (if re-running same version)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.event.inputs.version }}
        run: |
          REPO="asvechinsky-byte/PineappleExplorer"
          RELEASE_ID=$(curl -s -H "Authorization: Bearer $GH_TOKEN" "https://api.github.com/repos/$REPO/releases/tags/$VERSION" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('id',''))")
          if [ -z "$RELEASE_ID" ]; then echo "No existing release for $VERSION."; exit 0; fi
          echo "Found release $RELEASE_ID - deleting osx-arm64 assets..."
          curl -s -H "Authorization: Bearer $GH_TOKEN" "https://api.github.com/repos/$REPO/releases/$RELEASE_ID/assets" | python3 -c "import json,sys; [print(a['id']) for a in json.load(sys.stdin) if 'osx-arm64' in a['name'] or a['name']=='releases.osx-arm64.json']" | while read -r ASSET_ID; do
            echo "  Deleting asset $ASSET_ID"
            curl -s -X DELETE -H "Authorization: Bearer $GH_TOKEN" "https://api.github.com/repos/$REPO/releases/assets/$ASSET_ID"
          done

      - name: Upload Velopack packages to GitHub Releases
        run: |
          PRE_FLAG=""
          if [ "${{ github.event.inputs.prerelease }}" = "true" ]; then
            PRE_FLAG="--pre"
          fi

          ~/.dotnet/tools/vpk upload github \
            --repoUrl    https://github.com/asvechinsky-byte/PineappleExplorer \
            --token      ${{ secrets.GITHUB_TOKEN }} \
            --outputDir  vpk-out \
            --channel    osx-arm64 \
            --releaseName "${{ github.event.inputs.version }}" \
            --publish \
            --merge \
            $PRE_FLAG

      # ── Keep signed build as workflow artifact ────────────────────────────
      - name: Upload signed build as artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: PineappleExplorer-mac-signed-${{ github.event.inputs.version }}
          path: ${{ steps.names.outputs.dist_fn }}.zip
