name: Sign & Notarize Mac Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 0.8.75)'
        required: true

jobs:
  sign-notarize:
    runs-on: macos-latest
    steps:
      - name: Import certificate
        env:
          P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: |
          echo "$P12_BASE64" | base64 --decode > certificate.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import certificate.p12 -k build.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k actions build.keychain
          rm certificate.p12

      - name: Import API key
        env:
          API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: |
          mkdir -p ~/private_keys
          echo "$API_KEY_BASE64" | base64 --decode > ~/private_keys/AuthKey_HY39BF4WZT.p8

      - name: Download unsigned Mac build from FTP
        run: |
          curl -u "alex@explorer.astroframe.com:${{ secrets.FTP_PASSWORD }}" \
            "ftp://giowm1258.siteground.biz/PineappleExplorer-mac-arm64.zip" \
            -o unsigned.zip

      - name: Extract, sign, and notarize
        env:
          TEAM_ID: U66JCS85MM
          KEY_ID: HY39BF4WZT
          ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          # Extract
          unzip -q unsigned.zip -d app_extracted

          APP="app_extracted/PineappleExplorer.app"

          # Sign all binaries inside the bundle first, then the bundle itself
          find "$APP/Contents/MacOS" -type f | while read f; do
            codesign --force --options runtime --sign "Developer ID Application: Alex Svechinsky ($TEAM_ID)" "$f"
          done
          find "$APP/Contents" -name "*.dylib" -o -name "*.so" | while read f; do
            codesign --force --options runtime --sign "Developer ID Application: Alex Svechinsky ($TEAM_ID)" "$f"
          done
          codesign --force --deep --options runtime \
            --sign "Developer ID Application: Alex Svechinsky ($TEAM_ID)" \
            "$APP"

          # Verify signature
          codesign --verify --deep --strict "$APP"
          echo "Signature OK"

          # Zip for notarization
          ditto -c -k --keepParent "$APP" notarize.zip

          # Submit for notarization
          xcrun notarytool submit notarize.zip \
            --key ~/private_keys/AuthKey_HY39BF4WZT.p8 \
            --key-id "$KEY_ID" \
            --issuer "$ISSUER_ID" \
            --wait

          # Staple
          xcrun stapler staple "$APP"

          # Create final signed zip
          ditto -c -k --keepParent "$APP" "PineappleExplorer-${{ github.event.inputs.version }}-mac-arm64.zip"

      - name: Upload signed build to FTP
        run: |
          curl -T "PineappleExplorer-${{ github.event.inputs.version }}-mac-arm64.zip" \
            "ftp://giowm1258.siteground.biz/PineappleExplorer-mac-arm64.zip" \
            --user "alex@explorer.astroframe.com:${{ secrets.FTP_PASSWORD }}" \
            --ftp-pasv

      - name: Upload signed build as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: PineappleExplorer-mac-signed
          path: PineappleExplorer-${{ github.event.inputs.version }}-mac-arm64.zip
